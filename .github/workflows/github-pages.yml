# Publish GitHub Pages from battle-game/ so https://<user>.github.io/battle-game/ loads index.html at site root.
# Repo → Settings → Pages → Build: GitHub Actions (first run may need approving the workflow).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: battle-game
      - id: deployment
        uses: actions/deploy-pages@v4
